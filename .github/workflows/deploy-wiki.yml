name: Deploy Wiki

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'

jobs:
  deploy-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy wiki pages to GitHub Wiki
        uses: Andrew-Chen-Wang/github-wiki-action@v4
        with:
          path: wiki/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_WIKI_REPO: paulmann/RDP-Diagnostic-Tool
